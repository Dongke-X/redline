<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Redline Settings</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0; padding: 20px; max-width: 480px;
    background: #fafafa; color: #222;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1f1f1f; color: #eee; }
    textarea, select { background: #2a2a2a; color: #eee; border-color: #444; }
  }
  h1 { font-size: 16px; margin: 0 0 16px; }
  label { display: block; font-weight: 500; margin: 14px 0 6px; }
  select, textarea {
    width: 100%; padding: 8px 10px; box-sizing: border-box;
    border: 1px solid #d0d0d0; border-radius: 6px; font: inherit;
  }
  textarea { min-height: 100px; resize: vertical; font-family: ui-monospace, monospace; font-size: 12px; }
  button {
    margin-top: 16px; padding: 8px 18px;
    border: 1px solid #007aff; background: #007aff; color: #fff;
    border-radius: 6px; cursor: pointer; font: inherit;
  }
  .toast {
    margin-left: 12px; color: #34c759; opacity: 0; transition: opacity .3s;
  }
  .toast.show { opacity: 1; }
  .help { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
  <h1 id="title"></h1>

  <label id="lbl-mode" for="save-mode"></label>
  <select id="save-mode">
    <option value="zip" id="opt-zip"></option>
    <option value="fs" id="opt-fs"></option>
  </select>
  <div class="help" id="help-mode"></div>

  <label id="lbl-auto" for="autoinject"></label>
  <textarea id="autoinject"></textarea>

  <div>
    <button id="save"></button>
    <span class="toast" id="toast"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
