name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Verify version sync
        run: |
          node scripts/sync-version.mjs
          if ! git diff --quiet; then
            echo "❌ version sync produced uncommitted changes:"
            git diff --stat
            exit 1
          fi
